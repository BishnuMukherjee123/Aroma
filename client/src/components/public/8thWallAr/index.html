  <style>
    /* Completely hide the 'powered by 8thwall' watermark from the loading screen */
    #poweredby, .poweredby-img, #loadBackground > div:last-child {
      display: none !important;
      visibility: hidden !important;
      opacity: 0 !important;
    }
  </style>

  <!-- 8th Wall scripts must load synchronously BEFORE React mounts -->
  <script crossorigin="anonymous" src="/external/scripts/8frame-1.5.0.min.js"></script>
  
  <!-- Serve native NPM files directly from node_modules so WASM files route correctly -->
  <script src="/node_modules/@8thwall/xrextras/dist/xrextras.js"></script>
  <script src="/node_modules/@8thwall/landing-page/dist/landing-page.js"></script>
  
  <!-- POLYFILL: 8th Wall's engine expects document.currentScript to exist, but it is natively null inside ES Modules. -->
  <!-- This tricks xr.js into finding its base URL so it can download its WASM files without crashing. -->
  <script>
    Object.defineProperty(document, 'currentScript', {
      get: function() {
        const fakeScript = document.createElement('script');
        fakeScript.src = window.location.origin + "/node_modules/@8thwall/engine-binary/dist/xr.js";
        fakeScript.setAttribute('data-preload-chunks', 'slam');
        return fakeScript;
      }
    });
  </script>
  <script type="module" src="/node_modules/@8thwall/engine-binary/dist/xr.js" async="true" data-preload-chunks="slam"></script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
