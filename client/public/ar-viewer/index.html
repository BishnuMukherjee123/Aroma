<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!--
    iOS Safari notes
    ────────────────
    1. viewport-fit=cover prevents the safe-area inset from punching black
       bars into the camera passthrough.
    2. We DO NOT use Cache-Control: no-store here. iOS Safari treats no-store
       pages as "non-persistable" which can interact badly with permission
       dialogs and break BFCache restoration.
    3. The 8th Wall engine reads document.currentScript when xr.js is fetched
       to locate its sibling WASM files (xr-slam.js, xr-face.js). Plain
       <script> tags expose currentScript correctly so no shim is needed —
       only the ES-module variant requires the shim used in the React route.
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <title>View in AR – Aroma</title>

  <!--
    Resource preload hints — start downloading all 8th Wall scripts in parallel
    immediately when the HTML head is parsed. Without these, the four <script>
    tags below load roughly sequentially because each is `defer`-equivalent
    and HTTP/1.1 connections are serialised. With preload the browser issues
    all requests at once, cutting the cold-camera-open time roughly in half.
  -->
  <link rel="preload" as="script" href="/8thwall/external/scripts/8frame-1.5.0.min.js" crossorigin="anonymous">
  <link rel="preload" as="script" href="/8thwall/vendor/xrextras/xrextras.js" crossorigin="anonymous">
  <link rel="preload" as="script" href="/8thwall/vendor/landing-page/landing-page.js" crossorigin="anonymous">
  <link rel="preload" as="script" href="/8thwall/vendor/engine-binary/xr.js" crossorigin="anonymous">
  <link rel="preload" as="script" href="/8thwall/vendor/engine-binary/xr-slam.js" crossorigin="anonymous">

  <!--
    Script load order MUST match the official 8th Wall A-Frame example.
    All scripts are local (served from /8thwall/...) so they share an origin
    with the page. iOS WebKit refuses to grant camera permission across a
    cross-origin script chain that initiates getUserMedia.

    DO NOT reorder these. xrextras depends on AFRAME, landing-page depends
    on xrextras, and xr.js loads last (async) so AFRAME parses the scene
    while the engine warms up in parallel.
  -->
  <script crossorigin="anonymous" src="/8thwall/external/scripts/8frame-1.5.0.min.js"></script>
  <script src="/8thwall/vendor/xrextras/xrextras.js" crossorigin="anonymous"></script>
  <script src="/8thwall/vendor/landing-page/landing-page.js" crossorigin="anonymous"></script>
  <script src="/8thwall/vendor/engine-binary/xr.js" crossorigin="anonymous" async data-preload-chunks="slam"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      /* On iOS, allowing the page to scroll causes the camera canvas to
         momentarily detach when the URL bar collapses — keep it locked. */
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    /* ── In-AR UI overlays ─────────────────────────────────────────────
       Three pill-shaped controls sit on top of the camera feed:
         • close button (top-left)
         • dish name pill (top-right)
         • "Tap a surface to place the dish" hint (bottom-centre, hides
           after the user places the dish)
       All use a frosted-glass dark style to read on any background.
    */
    .ar-ui {
      position: fixed; inset: 0;
      z-index: 20;
      pointer-events: none;
    }

    .ar-ui-pill {
      pointer-events: auto;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      background: rgba(20, 20, 20, 0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
      transition: opacity 0.3s, transform 0.3s;
    }

    .ar-close {
      position: absolute;
      top: env(safe-area-inset-top, 0) ;
      top: calc(env(safe-area-inset-top, 0px) + 16px);
      left: 16px;
      width: 44px;
      height: 44px;
      padding: 0;
      justify-content: center;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      user-select: none;
    }

    .ar-title {
      position: absolute;
      top: calc(env(safe-area-inset-top, 0px) + 16px);
      right: 16px;
      max-width: 60%;
      font-weight: 600;
      letter-spacing: 0.2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .ar-hint {
      position: absolute;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 24px);
      left: 50%;
      transform: translateX(-50%);
      font-size: 15px;
      /* Keep on a single line — overrides the pill's default flex-wrap and
         prevents narrow phones from breaking the hint into two rows. */
      white-space: nowrap;
    }

    /*
      Placement-success toast. Appears top-centre below the dish-name pill
      the moment the model finishes loading, then auto-dismisses after a
      short hold. Green tint to read as a positive confirmation.

      Two-keyframe entrance (slide-down + fade-in) and matching exit so
      the toast feels intentional rather than just popping in/out.
    */
    .ar-toast {
      position: absolute;
      top: calc(env(safe-area-inset-top, 0px) + 76px);
      left: 50%;
      background: linear-gradient(180deg, #34c172 0%, #29a560 100%);
      color: #fff;
      font-weight: 600;
      font-size: 14px;
      padding: 12px 18px;
      border-radius: 14px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.35);
      max-width: calc(100% - 32px);
      white-space: nowrap;
      pointer-events: none;
      z-index: 25;

      /* Hidden default state */
      opacity: 0;
      transform: translateX(-50%) translateY(-14px) scale(0.96);
      transition:
        opacity 0.28s cubic-bezier(0.4, 0, 0.2, 1),
        transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .ar-toast.is-visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0) scale(1);
    }

    /*
      Bottom action bar — Reset and Menu buttons. Sits above the iOS home
      indicator. Buttons share the same pill style as the rest of the UI.
    */
    .ar-actions {
      position: absolute;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 24px);
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 12px;
      padding: 0 16px;
      pointer-events: none;
    }
    .ar-action-btn {
      pointer-events: auto;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 22px;
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 999px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.2px;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
      transition: opacity 0.3s, transform 0.2s, background-color 0.2s;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      white-space: nowrap;
    }
    .ar-action-btn:active { transform: scale(0.96); }

    .ar-reset {
      background: linear-gradient(180deg, #d05050 0%, #b03e3e 100%);
    }
    .ar-menu {
      background: rgba(20, 20, 20, 0.65);
    }

    /* Hidden until the dish is placed; revealed alongside the toast. */
    .ar-actions {
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .ar-actions.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* Faded-out state — applied via JS once the dish is placed */
    .ar-ui-pill.is-hidden {
      opacity: 0;
      transform: translate(var(--tx, 0), 6px);
      pointer-events: none;
    }
    .ar-hint.is-hidden { transform: translate(-50%, 6px); }

    /*
      The original "Tap To Place Model" prompt overlay is now replaced by the
      bottom hint pill above. We hide its container so it doesn't double up.
    */
    .over { display: none; }

    /* ── Hide 8th Wall watermark ─────────────────────────────────────── */
    #poweredby, .poweredby-img, #loadBackground > div:last-child {
      display: none !important;
      visibility: hidden !important;
      opacity: 0 !important;
    }
  </style>
</head>

<body>
  <!-- ── In-AR UI overlay (close button, dish name, tap hint) ─────────── -->
  <div class="ar-ui" id="arUi">
    <button class="ar-ui-pill ar-close" id="arClose" aria-label="Close AR view">×</button>
    <div class="ar-ui-pill ar-title" id="arTitle">View in AR</div>
    <div class="ar-ui-pill ar-hint" id="arHint">
      <span aria-hidden="true">👆</span>
      <span>Tap a surface to place the dish</span>
    </div>
    <!--
      Placement-success toast. Hidden by default, briefly shown after the
      dish finishes loading. Wording reflects all interactions actually
      available to the user (drag is intentionally NOT mentioned because
      we don't ship a drag handler).
    -->
    <div class="ar-toast" id="arToast" role="status" aria-live="polite">
      ✓ Placed! Pinch to scale
    </div>

    <!--
      Bottom action bar — Reset clears the placed dish so the user can
      retry placement; Menu returns to the menu page. Both are hidden
      until placement, then fade in alongside the success toast.
    -->
    <div class="ar-actions" id="arActions">
      <button class="ar-action-btn ar-reset" id="arReset" type="button">
        <span aria-hidden="true">↻</span>
        <span>Reset</span>
      </button>
      <button class="ar-action-btn ar-menu" id="arMenu" type="button">
        <span aria-hidden="true">📋</span>
        <span>Menu</span>
      </button>
    </div>
  </div>

  <!-- Legacy tap-to-place prompt (now hidden via CSS, see .over { display:none }) -->
  <div class="over">
    <span id="promptText">Tap To Place Model</span>
  </div>

  <!--
    <a-scene> attributes worth knowing
    ──────────────────────────────────
    • allowedDevices: any
        Critical for iOS. Without it 8th Wall blocks devices it doesn't
        explicitly recognise — and Safari user-agents change frequently.
    • xrweb supplies the camera passthrough + SLAM tracking.
    • landing-page renders the official 8th Wall consent screen which
      handles getUserMedia inside a button click — this is the only
      reliable way to get camera permission on iOS Safari.

    Stability tuning
    ─────────────────
    • scale: responsive (default)
        After testing absolute scale, the position-drift issue (dish appears
        to float upward when the user moves the camera, because the engine
        constantly re-estimates camera height in real-world units) was much
        more disruptive than the gentle size variation that Responsive Scale
        causes when the user gets closer or further from the surface.
        Responsive Scale is the 8th Wall default and what their official
        examples use. The dish stays anchored to the floor; size variation
        is mild (~10-15% within a normal room).
    • disableWorldTracking: false  (explicit — default).
    • enableLighting: true         — feeds environment-light estimation back
      into the SLAM solver. The 8th Wall engine internally uses lighting
      cues to discriminate stable feature-points from noisy ones, which
      reduces ground-plane jitter visibly.

    Renderer choices (kept minimal for stability)
    ─────────────────────────────────────────────
    • The previous combo of physicallyCorrectLights + toneMapping:ACESFilmic
      + logarithmicDepthBuffer + precision:high + 2K shadow map was a major
      cause of perceived shaking: on phones it can drop frame rate well
      below 60 FPS, and any frame the renderer is late on, the model lags
      behind the actual camera pose by ~16-33 ms — the eye reads this as
      jitter.
    • antialias:true is the only "nice to have" that's cheap enough to keep.
      Everything else is now off, and the shadow map is 1024 (was 2048),
      which keeps the dish anchored at full FPS even on older iPhones.
  -->
  <a-scene
    id="ar-scene"
    tap-place
    landing-page
    xrextras-loading
    xrextras-runtime-error
    xrextras-gesture-detector
    xrextras-pbr-environment
    xrextras-almost-there
    renderer="colorManagement:true; antialias:true;"
    xrweb="
      allowedDevices: any;
      disableWorldTracking: false;
      enableLighting: true;
      defaultEnvironmentFogIntensity: 0.5;
      defaultEnvironmentFloorTexture: #groundTex;
      defaultEnvironmentFloorColor: #FFF;
      defaultEnvironmentSkyBottomColor: #B4C4CC;
      defaultEnvironmentSkyTopColor: #5ac8fa;
      defaultEnvironmentSkyGradientStrength: 0.5;"
  >
    <a-assets>
      <img id="groundTex" src="/8thwall/assets/sand.jpg">
      <!-- src filled by JS once URL params are read -->
      <a-asset-item id="dishModel" src=""></a-asset-item>
    </a-assets>

    <!-- Camera positioned to match working 8th Wall example -->
    <a-camera
      id="camera"
      position="0 8 8"
      raycaster="objects: .cantap"
      cursor="fuse: false; rayOrigin: mouse;">
    </a-camera>

    <!--
      Directional light + shadow camera.

      shadowMap reduced from 2048 → 1024.  At 2048 the GPU was rasterising
      a 4-million-texel depth buffer every frame, which on mid-tier phones
      pushed frame time over the 16.6 ms 60-FPS budget. The visible result
      is the dish appearing to lag and shake slightly behind real-world
      camera motion. 1024×1024 cuts that depth-buffer cost to a quarter,
      restores 60 FPS, and the shadow itself looks identical at viewing
      distances of ~50 cm and beyond.
    -->
    <a-entity
      light="type:directional; intensity:0.9; castShadow:true; shadowMapHeight:1024; shadowMapWidth:1024; shadowCameraTop:40; shadowCameraBottom:-40; shadowCameraRight:40; shadowCameraLeft:-40; target:#camera"
      xrextras-attach="target:camera; offset:8 15 4"
      position="1 4.3 2.5"
      shadow
    ></a-entity>

    <a-light type="ambient" intensity="0.3"></a-light>
    <a-light type="hemisphere" ground-color="#333" intensity="0.8"></a-light>

    <a-box
      id="ground"
      class="cantap"
      scale="1000 2 1000"
      position="0 -0.99 0"
      material="shader:shadow; transparent:true; opacity:0.7"
      shadow
    ></a-box>
  </a-scene>

  <script>
    // ── BFCache guard ──────────────────────────────────────────────────────────
    // 8th Wall engine state (camera, WASM, WebGL) does NOT survive a BFCache
    // restore. Force a full reload so scripts re-execute from scratch.
    window.addEventListener('pageshow', function (event) {
      if (event.persisted) {
        window.location.reload();
      }
    });

    // ── Read URL params ────────────────────────────────────────────────────────
    var params  = new URLSearchParams(window.location.search);
    var modelUrl = params.get('model') || '';
    var dishName = params.get('name') || '';
    var backUrl  = params.get('back') || '/';

    var assetItem = document.getElementById('dishModel');
    if (assetItem) assetItem.setAttribute('src', modelUrl);

    // Pre-warm the GLB into the HTTP cache as soon as we know its URL.
    // A-Frame's <a-asset-item> normally only starts downloading when the
    // scene begins — which means up to a second of delay between tap and
    // model appearance. By firing a parallel fetch() now, the binary is
    // already in the browser's HTTP cache by the time A-Frame asks for it,
    // and the dish appears within a few hundred ms of the tap.
    if (modelUrl) {
      fetch(modelUrl, { mode: 'cors', credentials: 'omit', cache: 'force-cache' })
        .catch(function () { /* prefetch best-effort, swallow errors */ });
    }

    // ── In-AR UI wiring ───────────────────────────────────────────────────────
    // Set the dish name in the top-right pill. Falls back to a generic label
    // when ?name is omitted from the URL (defensive, not expected in practice).
    var titleEl = document.getElementById('arTitle');
    if (titleEl) titleEl.textContent = dishName || 'View in AR';

    // Close button — returns to the menu page using the back URL passed by
    // MenuCard. window.location.replace so we don't leave an extra entry in
    // the browser history stack.
    var closeBtn = document.getElementById('arClose');
    if (closeBtn) {
      closeBtn.addEventListener('click', function () {
        window.location.replace(backUrl);
      });
    }

    // Menu button — same destination as the close button, just a second
    // affordance the user-flow screenshot asked for.
    var menuBtn = document.getElementById('arMenu');
    if (menuBtn) {
      menuBtn.addEventListener('click', function () {
        window.location.replace(backUrl);
      });
    }

    // Reset button — removes the spawned dish, re-arms tap-place, and shows
    // the "tap a surface" hint again so the user can pick a new spot.
    // The actual entity removal lives in the tap-place component because it
    // owns the spawnedEl reference; we expose a custom event for it.
    var resetBtn = document.getElementById('arReset');
    if (resetBtn) {
      resetBtn.addEventListener('click', function () {
        document.dispatchEvent(new Event('aroma-ar-reset'));
      });
    }

    // ── tap-place component ────────────────────────────────────────────────────
    var tapPlaceComponent = {
      // Spawn scale: 19.8 (= previous 22 × 0.9, per the user's request to
      // shrink the starting dish by 10%). Unitless multiplier of the model's
      // own glTF units, in Responsive Scale mode.
      schema: { min: { default: 19.8 }, max: { default: 20.8 } },
      init: function () {
        var ground   = document.getElementById('ground');
        var promptEl = document.getElementById('promptText');
        this.spawnedEl = null;
        var self = this;

        // Reset listener — wired to the bottom Reset button. Clears the
        // currently-placed entity so the user can tap a new spot. We restore
        // the ground's `.cantap` class (removed in the click handler), bring
        // back the on-screen tap hint, and hide the action bar + toast.
        document.addEventListener('aroma-ar-reset', function () {
          if (self.spawnedEl && self.spawnedEl.parentNode) {
            self.spawnedEl.parentNode.removeChild(self.spawnedEl);
          }
          self.spawnedEl = null;
          ground.classList.add('cantap');
          if (promptEl) promptEl.style.display = '';
          var hint = document.getElementById('arHint');
          if (hint) hint.classList.remove('is-hidden');
          var actions = document.getElementById('arActions');
          if (actions) actions.classList.remove('is-visible');
          var toast = document.getElementById('arToast');
          if (toast) toast.classList.remove('is-visible');
        });

        ground.addEventListener('click', function (event) {
          if (self.spawnedEl) return;
          if (promptEl) promptEl.style.display = 'none';

          // Hide the on-screen "tap a surface" hint pill — placement is
          // happening, the user no longer needs the instruction.
          var hintEl = document.getElementById('arHint');
          if (hintEl) hintEl.classList.add('is-hidden');

          var touchPoint = event.detail.intersection.point;

          // ── No distance compensation in Absolute Scale mode ──────────────
          // When xrweb is in `scale: absolute`, the engine renders the model
          // in real-world units and automatically applies correct perspective
          // (a far-away dish will look smaller on-screen — that's physically
          // correct). Multiplying scale by tap distance the way we used to do
          // in Responsive Scale would defeat the purpose of absolute scale
          // and reintroduce the camera-distance size variation the user
          // explicitly does not want. So we do nothing here.

          var el = document.createElement('a-entity');
          self.spawnedEl = el;

          ground.classList.remove('cantap');

          // Use the schema's `min` directly as the deterministic base scale.
          // (We no longer apply a distance factor — see the comment above
          // about absolute-scale mode.)
          var targetScale = self.data.min;

          // Float the model above the detected floor.
          //
          // The offset is expressed as a fraction of the model's own
          // placement scale (instead of a fixed scene-unit value). On a
          // phone in real AR, Responsive Scale multiplies all scene units
          // by the camera-height factor — but on desktop preview (no AR)
          // the model renders at its raw scale, so a flat 0.30 offset
          // becomes invisible beneath it. Tying the offset to targetScale
          // keeps the visual gap consistent across both.
          //
          // 0.07 = 7% of the model's bounding height — tight visible gap of
          // roughly 10–12 cm between the dish and the surface.
          var FLOAT_OFFSET_M = targetScale * 0.07;
          el.setAttribute(
            'position',
            touchPoint.x + ' ' + (touchPoint.y + FLOAT_OFFSET_M) + ' ' + touchPoint.z
          );
          el.setAttribute('rotation', '0 ' + (Math.random() * 360) + ' 0');

          el.setAttribute('visible', 'false');
          el.setAttribute('scale', '0.0001 0.0001 0.0001');
          el.setAttribute('shadow', { receive: false, cast: true });
          el.setAttribute('class', 'cantap');
          el.setAttribute('gltf-model', '#dishModel');
          self.el.sceneEl.appendChild(el);

          el.addEventListener('model-loaded', function () {
            el.setAttribute('visible', 'true');
            // Faster spawn: easeOutQuad over 350 ms (was easeOutElastic 800 ms).
            // The elastic bounce delayed the dish from being visually "ready"
            // by close to a full second after it was actually loaded. A short
            // ease-out feels snappier and matches what most commercial AR
            // products do (IKEA Place, Amazon View in Your Room).
            el.setAttribute('animation', {
              property: 'scale',
              to: targetScale + ' ' + targetScale + ' ' + targetScale,
              easing: 'easeOutQuad',
              dur: 350
            });

            // Reveal the action bar (Reset + Menu) — these stay until the
            // user explicitly resets or leaves AR.
            var actionsEl = document.getElementById('arActions');
            if (actionsEl) actionsEl.classList.add('is-visible');

            // Show the "Placed! Pinch to scale" toast with an animated
            // entrance, hold for 1.5 s, then animate out. We deliberately
            // wait until the model is loaded (not just tapped) so the
            // toast and the dish appear together.
            var toastEl = document.getElementById('arToast');
            if (toastEl) {
              // Add the visible class on the next frame so the browser
              // applies the transition (instead of jumping to end state).
              requestAnimationFrame(function () {
                toastEl.classList.add('is-visible');
              });
              setTimeout(function () {
                toastEl.classList.remove('is-visible');
              }, 1500);
            }
          });

          el.addEventListener('animationcomplete', function () {
            el.removeAttribute('animation');
            el.setAttribute('scale', targetScale + ' ' + targetScale + ' ' + targetScale);
            el.setAttribute('xrextras-two-finger-rotate', '');
            // Pinch range — multipliers relative to the placement scale (8.55).
            // min: 0.25 → can shrink to ~25% (≈ scale 2.14)
            // max: 8    → can grow to 8×    (≈ scale 68)
            // ~32× total range, tuned for Responsive Scale mode.
            el.setAttribute('xrextras-pinch-scale', 'min: 0.25; max: 8');

            // ── No drift guard ────────────────────────────────────────────
            // We deliberately do NOT re-set the entity position after this
            // point. In xrweb (8th Wall world-tracking) mode the entity is
            // already anchored to the SLAM world — its local-space position
            // attribute does not change as the camera moves. What you may
            // perceive as "drift" is the SLAM engine refining its floor
            // estimate (±0.5° per the 8th Wall team's own statements),
            // which subtly rotates the ground plane and hence shifts the
            // model's apparent screen position.
            //
            // The official 8th Wall A-Frame examples (animation-mixer,
            // tap-to-place, etc.) do not implement any drift correction
            // either, because forcefully re-setting `position` would only
            // fight the engine's own anchoring and make jitter worse.
            //
            // Accuracy can be improved by environmental factors only:
            //   • better lighting on the ground plane,
            //   • non-repeating textures (carpet, concrete, wood grain),
            //   • not pointing the camera at flat / featureless surfaces.
          });
        });
      }
    };

    // ── Register component once AFRAME is ready ───────────────────────────────
    function registerTapPlace() {
      if (window.AFRAME && !AFRAME.components['tap-place']) {
        AFRAME.registerComponent('tap-place', tapPlaceComponent);
      }
    }

    if (window.AFRAME) {
      registerTapPlace();
    } else {
      window.addEventListener('load', registerTapPlace);
    }
  </script>
</body>
</html>
