<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!--
    iOS Safari notes
    ────────────────
    1. viewport-fit=cover prevents the safe-area inset from punching black
       bars into the camera passthrough.
    2. We DO NOT use Cache-Control: no-store here. iOS Safari treats no-store
       pages as "non-persistable" which can interact badly with permission
       dialogs and break BFCache restoration.
    3. This file is served as raw HTML from /public/ (NOT built by Next.js).
       8th Wall + iOS Safari requires synchronous <script> tags in <head>
       and a non-bundled `document.currentScript` — both of which only work
       reliably outside the Next.js bundler. See
       app/r/[restaurant_id]/ar/[dish_id]/page.tsx for the redirect.
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <title>View in AR – Aroma</title>

  <!--
    Importmap — must come BEFORE any module that imports `three` or
    `three/addons/`. We pin to a stable Three.js LTS branch served via
    UNPKG so this static HTML file (which Next.js does NOT bundle) can
    use bare specifiers like `import * as THREE from 'three'`.

    iOS Safari note: native importmap support is iOS 16.4+. We load the
    es-module-shims polyfill BEFORE the importmap declaration so older
    iPhones (still ~30 % of installed base) can run this file too.
  -->
  <!--
    es-module-shims must run before ANY module/importmap is parsed.
    `async` is intentionally omitted so it blocks parsing until ready.
    `data-import-maps-check-uri` (and friends) are not needed; defaults
    are fine.
  -->
  <script src="https://ga.jspm.io/npm:[email protected]/dist/es-module-shims.js" crossorigin="anonymous"></script>

  <script type="importmap">
    {
      "imports": {
        "three":         "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <!--
    8th Wall scripts — loaded for the camera-pipeline path on touch devices.
    Even on desktop they're loaded but never started (we never call XR8.run()
    on desktop), so they're inert. Keeping them here unconditionally avoids
    a second round-trip on phones that need them.

    Three.js scene is built either way; on mobile XR8.Threejs.pipelineModule()
    creates the renderer + scene + camera and we attach our content to those,
    on desktop we create our own.
  -->
  <script src="/8thwall/vendor/xrextras/xrextras.js" crossorigin="anonymous"></script>
  <script src="/8thwall/vendor/landing-page/landing-page.js" crossorigin="anonymous"></script>
  <script src="/8thwall/vendor/engine-binary/xr.js" crossorigin="anonymous" async data-preload-chunks="slam"></script>

  <!-- Resource preload hints — start downloading 8th Wall scripts in
       parallel as soon as <head> is parsed. -->
  <link rel="preload" as="script" href="/8thwall/vendor/xrextras/xrextras.js" crossorigin="anonymous">
  <link rel="preload" as="script" href="/8thwall/vendor/landing-page/landing-page.js" crossorigin="anonymous">
  <link rel="preload" as="script" href="/8thwall/vendor/engine-binary/xr.js" crossorigin="anonymous">
  <link rel="preload" as="script" href="/8thwall/vendor/engine-binary/xr-slam.js" crossorigin="anonymous">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    #camerafeed {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
    }

    /* Hide 8th Wall watermark */
    #poweredby, .poweredby-img, #loadBackground > div:last-child {
      display: none !important;
      visibility: hidden !important;
      opacity: 0 !important;
    }

    /* ── In-AR UI overlays ──────────────────────────────────────────── */
    .ar-ui {
      position: fixed; inset: 0;
      z-index: 20;
      pointer-events: none;
    }

    .ar-ui-pill {
      pointer-events: auto;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      background: rgba(20, 20, 20, 0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
      transition: opacity 0.3s, transform 0.3s;
    }

    .ar-close {
      position: absolute;
      top: calc(env(safe-area-inset-top, 0px) + 16px);
      left: 16px;
      width: 44px;
      height: 44px;
      padding: 0;
      justify-content: center;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
    }

    .ar-title {
      position: absolute;
      top: calc(env(safe-area-inset-top, 0px) + 16px);
      right: 16px;
      max-width: 60%;
      font-weight: 600;
      letter-spacing: 0.2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .ar-hint {
      position: absolute;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 24px);
      left: 50%;
      transform: translateX(-50%);
      font-size: 15px;
      white-space: nowrap;
    }

    .ar-ui-pill.is-hidden { opacity: 0; transform: translate(0, 6px); pointer-events: none; }
    .ar-hint.is-hidden    { transform: translate(-50%, 6px); }

    /* Toast */
    .ar-toast {
      position: absolute;
      top: calc(env(safe-area-inset-top, 0px) + 76px);
      left: 50%;
      background: linear-gradient(180deg, #34c172 0%, #29a560 100%);
      color: #fff;
      font-weight: 600;
      font-size: 14px;
      padding: 12px 18px;
      border-radius: 14px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.35);
      max-width: calc(100% - 32px);
      white-space: nowrap;
      pointer-events: none;
      z-index: 25;

      opacity: 0;
      transform: translateX(-50%) translateY(-14px) scale(0.96);
      transition:
        opacity 0.28s cubic-bezier(0.4, 0, 0.2, 1),
        transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .ar-toast.is-visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0) scale(1);
    }

    /* Bottom action bar */
    .ar-actions {
      position: absolute;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 24px);
      left: 0; right: 0;
      display: flex;
      justify-content: center;
      gap: 12px;
      padding: 0 16px;
      pointer-events: none;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .ar-actions.is-visible { opacity: 1; transform: translateY(0); }
    .ar-action-btn {
      pointer-events: auto;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 22px;
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 999px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.2px;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
      transition: opacity 0.3s, transform 0.2s, background-color 0.2s;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      white-space: nowrap;
    }
    .ar-action-btn:active { transform: scale(0.96); }
    .ar-reset { background: linear-gradient(180deg, #d05050 0%, #b03e3e 100%); }
    .ar-menu  { background: rgba(20, 20, 20, 0.65); }

    /* Loading-spinner placeholder */
    .ar-placeholder-overlay {
      position: absolute;
      width: 64px;
      height: 64px;
      border: 3px solid rgba(90, 215, 255, 0.85);
      border-top-color: transparent;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      animation: ar-ph-spin 1.2s linear infinite;
      pointer-events: none;
      z-index: 15;
      box-shadow: 0 0 24px rgba(90, 215, 255, 0.4);
    }
    @keyframes ar-ph-spin {
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }
  </style>
</head>

<body>
  <canvas id="camerafeed"></canvas>

  <div class="ar-ui" id="arUi">
    <button class="ar-ui-pill ar-close" id="arClose" aria-label="Close AR view">×</button>
    <div class="ar-ui-pill ar-title" id="arTitle">View in AR</div>
    <div class="ar-ui-pill ar-hint" id="arHint">
      <span aria-hidden="true">👆</span>
      <span>Tap a surface to place the dish</span>
    </div>
    <div class="ar-toast" id="arToast" role="status" aria-live="polite">
      ✓ Placed! Pinch to scale
    </div>
    <div class="ar-actions" id="arActions">
      <button class="ar-action-btn ar-reset" id="arReset" type="button">
        <span aria-hidden="true">↻</span>
        <span>Reset</span>
      </button>
      <button class="ar-action-btn ar-menu" id="arMenu" type="button">
        <span aria-hidden="true">📋</span>
        <span>Menu</span>
      </button>
    </div>
  </div>

  <script>
    // ── BFCache guard ──────────────────────────────────────────────────
    window.addEventListener('pageshow', function (e) {
      if (e.persisted) window.location.reload();
    });
  </script>

  <script type="module">
    // ──────────────────────────────────────────────────────────────────────
    // Aroma AR viewer — Three.js based.
    //
    //   • Mobile (touch device) : 8th Wall pipeline owns Three.js scene/
    //                             renderer/camera. Real camera passthrough,
    //                             SLAM tracking, raycaster placement.
    //   • Desktop (non-touch)   : Self-managed Three.js scene with a sky
    //                             gradient + sand floor "playground"
    //                             (mimics A-Frame's xrweb defaultEnvironment).
    //
    // The shared parts — lighting, dish placement, gestures, UI —
    // live in helpers callable from either path.
    // ──────────────────────────────────────────────────────────────────────

    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
    import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

    // 8th Wall's XR8.Threejs.pipelineModule() reads window.THREE on init.
    // Without this assignment the mobile pipeline silently fails to bind
    // the renderer/scene/camera, so onStart() never fires and the camera
    // stays black on iOS even when permission is granted.
    window.THREE = THREE;

    // ── URL params ─────────────────────────────────────────────────────────
    const params   = new URLSearchParams(window.location.search);
    const modelUrl = params.get('model') || '';
    const dishName = params.get('name')  || '';
    const backUrl  = params.get('back')  || '/';

    // ── DOM refs & UI wiring ──────────────────────────────────────────────
    const canvas    = document.getElementById('camerafeed');
    const titleEl   = document.getElementById('arTitle');
    const hintEl    = document.getElementById('arHint');
    const toastEl   = document.getElementById('arToast');
    const actionsEl = document.getElementById('arActions');
    const closeBtn  = document.getElementById('arClose');
    const menuBtn   = document.getElementById('arMenu');
    const resetBtn  = document.getElementById('arReset');

    titleEl.textContent = dishName || 'View in AR';
    closeBtn.addEventListener('click', () => window.location.replace(backUrl));
    menuBtn .addEventListener('click', () => window.location.replace(backUrl));

    // ── Spawn parameters ──────────────────────────────────────────────────
    // Two scales because mobile AR (responsive-scale) and desktop (raw)
    // render the same number very differently.
    const BASE_SCALE_MOBILE  = 13.68; // 22.8 × 0.6 — user requested another 40% reduction
    const BASE_SCALE_DESKTOP = 1.5;   // 1 unit ≈ 1 m, so plate ~30 cm wide
    const FLOAT_OFFSET_M     = 0.10;  // 10 cm absolute float above the floor
    const PINCH_MIN          = 0.25;
    const PINCH_MAX          = 8;

    // ── Module-level state, mutated by both code paths ────────────────────
    let scene, camera, renderer;
    let groundPlane, shadowReceiver;
    let dishMesh = null, shadowMesh = null;
    let prewarmedScene = null;
    let modelReady = false;
    let pendingPlace = null;
    let placeholderEl = null;

    // Active spawn scale — picked by the boot path. Mobile uses the larger
    // value because xrweb's responsive-scale system scales the whole scene
    // by the camera-height factor; desktop renders at raw units so it
    // needs the smaller value to look like a plate, not a swimming pool.
    let activeBaseScale = BASE_SCALE_MOBILE;

    // ── HTTP-cache prewarm of the GLB ─────────────────────────────────────
    if (modelUrl) {
      fetch(modelUrl, { mode: 'cors', credentials: 'omit', cache: 'force-cache' })
        .catch(() => {});
    }

    // ──────────────────────────────────────────────────────────────────────
    // Renderer / scene quality config — same on AR and desktop so visuals
    // are identical wherever you preview.
    // ──────────────────────────────────────────────────────────────────────
    function configureRenderer(r) {
      r.shadowMap.enabled = true;
      r.shadowMap.type = THREE.PCFSoftShadowMap;
      r.outputColorSpace = THREE.SRGBColorSpace;
      // ACES Filmic is what every modern AR/3D viewer (model-viewer,
      // Sketchfab, IKEA Place) uses — keeps highlights from blowing out and
      // shadows from crushing to black, so PBR materials render naturally.
      r.toneMapping = THREE.ACESFilmicToneMapping;
      r.toneMappingExposure = 1.0;
      // Anisotropy = sharper textures at oblique angles. Capped to the
      // device's max so we don't ask for more than the GPU can deliver.
      r.maxTextureAnisotropy = r.capabilities.getMaxAnisotropy();
    }

    /**
     * Builds a small environment map from Three.js's built-in RoomEnvironment.
     * GLB files use PBR materials (PhysicallyCorrectMaterial), which look
     * flat and plasticky without something to reflect. RoomEnvironment is
     * a procedural box of soft area lights that ships with Three.js — it
     * gives every glossy/metallic surface plausible reflections at zero
     * runtime cost. Same approach <model-viewer> uses internally.
     */
    function buildEnvironment(r) {
      const pmrem = new THREE.PMREMGenerator(r);
      const env = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;
      pmrem.dispose();
      return env;
    }

    function applyEnvironment(targetScene, env) {
      targetScene.environment = env;
      // Don't set scene.background — we use the sky-dome shader on desktop
      // and the camera feed on mobile.
    }

    /**
     * Walks a loaded GLTF scene and applies texture/material polish:
     *   • castShadow on every mesh
     *   • disable frustum culling (xrweb's camera moves a lot, causing
     *     spurious culling pops)
     *   • set anisotropy on all textures so they stay sharp at angles
     *   • flag emissive/normal/AO maps with the right color space, since
     *     not every GLB exporter writes them correctly
     */
    function polishGltfScene(root, anisotropy) {
      root.traverse((child) => {
        if (!child.isMesh) return;
        child.castShadow = true;
        child.receiveShadow = false;
        child.frustumCulled = false;

        const setTextureProps = (tex, isColor) => {
          if (!tex) return;
          tex.anisotropy = anisotropy;
          if (isColor) tex.colorSpace = THREE.SRGBColorSpace;
          // Mipmaps are essential for crisp distant rendering. Some GLBs
          // ship without them generated.
          tex.minFilter = THREE.LinearMipmapLinearFilter;
          tex.magFilter = THREE.LinearFilter;
          tex.generateMipmaps = true;
          tex.needsUpdate = true;
        };

        const m = child.material;
        if (Array.isArray(m)) {
          m.forEach((mm) => fixMaterialMaps(mm, setTextureProps));
        } else {
          fixMaterialMaps(m, setTextureProps);
        }
      });
    }

    function fixMaterialMaps(material, setProps) {
      if (!material) return;
      // Diffuse / albedo: sRGB
      setProps(material.map,            true);
      setProps(material.emissiveMap,    true);
      // Linear (data) maps: keep linear color space
      setProps(material.normalMap,      false);
      setProps(material.roughnessMap,   false);
      setProps(material.metalnessMap,   false);
      setProps(material.aoMap,          false);
      // Slight nudge — most GLB exports look better with their own
      // env-map intensity bumped slightly.
      if (material.envMapIntensity !== undefined) {
        material.envMapIntensity = 1.0;
      }
      material.needsUpdate = true;
    }
    const gltfLoader  = new GLTFLoader();
    const dracoLoader = new DRACOLoader();
    dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.7/');
    gltfLoader.setDRACOLoader(dracoLoader);

    function loadModel() {
      if (!modelUrl) return;
      gltfLoader.load(
        modelUrl,
        (gltf) => {
          // Polish texture/material settings on every mesh — sets anisotropy,
          // ensures correct color spaces, fixes missing mipmaps, etc. The
          // anisotropy value comes from whatever renderer configureRenderer()
          // put on it (mobile vs desktop). If renderer isn't ready yet,
          // fall back to a sane 4x.
          const aniso = renderer?.maxTextureAnisotropy || 4;
          polishGltfScene(gltf.scene, aniso);
          prewarmedScene = gltf.scene;
          modelReady = true;
          if (pendingPlace) { placeDish(pendingPlace); pendingPlace = null; }
        },
        undefined,
        (err) => console.warn('[aroma] GLB load failed:', err)
      );
    }

    // ──────────────────────────────────────────────────────────────────────
    // Scene-building helpers — same calls work for both AR and desktop
    // because they only touch the scene we hand them.
    // ──────────────────────────────────────────────────────────────────────
    function addLighting(targetScene) {
      // Directional light with cast-shadow ON. With Three.js we get a real
      // PCF-soft shadow under the dish, which was the original motivation
      // for moving away from A-Frame.
      const dir = new THREE.DirectionalLight(0xffffff, 1.1);
      dir.position.set(2.5, 6, 3);
      dir.castShadow = true;
      dir.shadow.mapSize.set(1024, 1024);
      dir.shadow.bias = -0.0005;
      const d = 12;
      dir.shadow.camera.left   = -d;
      dir.shadow.camera.right  =  d;
      dir.shadow.camera.top    =  d;
      dir.shadow.camera.bottom = -d;
      dir.shadow.camera.near   = 0.1;
      dir.shadow.camera.far    = 50;
      dir.shadow.radius        = 4;
      targetScene.add(dir);

      targetScene.add(new THREE.AmbientLight(0xffffff, 0.45));
      targetScene.add(new THREE.HemisphereLight(0xffffff, 0x333333, 0.55));
    }

    function addRaycastAndShadowPlane(targetScene) {
      const groundGeo = new THREE.PlaneGeometry(2000, 2000);
      groundGeo.rotateX(-Math.PI / 2);
      groundPlane = new THREE.Mesh(
        groundGeo, new THREE.MeshBasicMaterial({ visible: false })
      );
      targetScene.add(groundPlane);

      const shadowGeo = new THREE.PlaneGeometry(2000, 2000);
      shadowGeo.rotateX(-Math.PI / 2);
      shadowReceiver = new THREE.Mesh(
        shadowGeo, new THREE.ShadowMaterial({ opacity: 0.45 })
      );
      shadowReceiver.position.y = 0.001;
      shadowReceiver.receiveShadow = true;
      targetScene.add(shadowReceiver);
    }

    /**
     * Adds the "playground" backdrop — sky gradient dome + curved sand
     * ground + matching fog. Mimics what A-Frame's xrweb defaultEnvironment*
     * parameters generate automatically.
     *
     * The original A-Frame playground produces a small curved-feeling world:
     * a finite circular ground that fades into the sky at the horizon. Our
     * earlier 2000 m flat plane went way past the fog so the floor+sky meet
     * at a hard line. The fix is a smaller, dome-shaped ground that the fog
     * clips smoothly.
     */
    function addPlayground(targetScene) {
      const SKY_TOP    = new THREE.Color(0x5ac8fa);
      const SKY_BOTTOM = new THREE.Color(0xb4c4cc);

      // Fog tinted to the sky's bottom colour. Density tuned so the floor
      // disappears smoothly around 60–80 m (FogExp2 reaches ~95 % at
      // ~3/density). Same range as the A-Frame playground.
      targetScene.fog = new THREE.FogExp2(SKY_BOTTOM.getHex(), 0.025);

      // Sky gradient via a custom shader on an inverted sphere.
      const skyGeo = new THREE.SphereGeometry(500, 32, 16);
      skyGeo.scale(-1, 1, 1);
      const skyMat = new THREE.ShaderMaterial({
        side: THREE.BackSide,
        depthWrite: false,
        fog: false,
        uniforms: {
          topColor:    { value: SKY_TOP },
          bottomColor: { value: SKY_BOTTOM },
          offset:      { value: 33 },
          exponent:    { value: 0.6 },
        },
        vertexShader: `
          varying vec3 vWorldPosition;
          void main() {
            vec4 worldPosition = modelMatrix * vec4(position, 1.0);
            vWorldPosition = worldPosition.xyz;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          uniform vec3 topColor;
          uniform vec3 bottomColor;
          uniform float offset;
          uniform float exponent;
          varying vec3 vWorldPosition;
          void main() {
            float h = normalize(vWorldPosition + vec3(0.0, offset, 0.0)).y;
            gl_FragColor = vec4(mix(bottomColor, topColor, max(pow(max(h, 0.0), exponent), 0.0)), 1.0);
          }
        `,
      });
      targetScene.add(new THREE.Mesh(skyGeo, skyMat));

      // ── Curved ground ───────────────────────────────────────────────────
      // A 200 m radius circle, sized so the fog (ends ~120 m) clips it well
      // before its real edge — that's what produces a smooth horizon. The
      // circle is placed on the floor plane (y = 0) and the dish gets
      // placed on top of it.
      //
      // Why a circle and not a square: the fog falloff is radial. A square
      // would show its corners poking through the fog at 45° angles.
      const sandTex = new THREE.TextureLoader().load('/8thwall/assets/sand.jpg');
      sandTex.wrapS = sandTex.wrapT = THREE.RepeatWrapping;
      sandTex.repeat.set(80, 80);
      sandTex.colorSpace = THREE.SRGBColorSpace;

      const groundGeo = new THREE.CircleGeometry(200, 96);
      groundGeo.rotateX(-Math.PI / 2);
      const groundMat = new THREE.MeshStandardMaterial({
        map: sandTex,
        roughness: 1.0,
        metalness: 0.0,
      });
      const ground = new THREE.Mesh(groundGeo, groundMat);
      ground.position.y = -0.002;
      ground.receiveShadow = true;
      targetScene.add(ground);
    }

    // ──────────────────────────────────────────────────────────────────────
    // Placement
    // ──────────────────────────────────────────────────────────────────────
    function placeDish(p) {
      removePlaceholder();
      if (!scene || !prewarmedScene) return;

      const dish = prewarmedScene.clone(true);
      dish.traverse((child) => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = false;
          child.frustumCulled = false;
        }
      });
      dish.position.set(p.x, p.y, p.z);
      dish.rotation.y = p.rot;

      const target = p.scale;
      const start  = 0.0001;
      dish.scale.set(start, start, start);
      scene.add(dish);
      dishMesh = dish;

      const t0 = performance.now();
      const dur = 350;
      const tick = () => {
        const t = Math.min(1, (performance.now() - t0) / dur);
        const e = 1 - (1 - t) * (1 - t);  // easeOutQuad
        const s = start + (target - start) * e;
        dish.scale.set(s, s, s);
        if (t < 1) requestAnimationFrame(tick);
      };
      requestAnimationFrame(tick);

      actionsEl.classList.add('is-visible');
      requestAnimationFrame(() => toastEl.classList.add('is-visible'));
      setTimeout(() => toastEl.classList.remove('is-visible'), 1500);
    }

    resetBtn.addEventListener('click', () => {
      if (dishMesh && scene) {
        scene.remove(dishMesh);
        dishMesh.traverse((child) => {
          if (child.isMesh) {
            child.geometry?.dispose();
            if (Array.isArray(child.material)) {
              child.material.forEach((m) => m.dispose());
            } else {
              child.material?.dispose();
            }
          }
        });
        dishMesh = null;
      }
      if (shadowMesh && scene) { scene.remove(shadowMesh); shadowMesh = null; }
      removePlaceholder();
      pendingPlace = null;
      hintEl.classList.remove('is-hidden');
      actionsEl.classList.remove('is-visible');
      toastEl.classList.remove('is-visible');
    });

    function showPlaceholder(screenX, screenY) {
      if (placeholderEl) return;
      const el = document.createElement('div');
      el.className = 'ar-placeholder-overlay';
      el.style.left = screenX + 'px';
      el.style.top  = screenY + 'px';
      document.body.appendChild(el);
      placeholderEl = el;
    }
    function removePlaceholder() {
      if (placeholderEl?.parentNode) {
        placeholderEl.parentNode.removeChild(placeholderEl);
      }
      placeholderEl = null;
    }

    // ──────────────────────────────────────────────────────────────────────
    // Tap/click → place
    // ──────────────────────────────────────────────────────────────────────
    function setupPlacementInput() {
      const raycaster = new THREE.Raycaster();
      const ndc = new THREE.Vector2();

      // Universal pointer handler — works for both touch and mouse since we
      // listen on `click` (which fires after any tap or click).
      const onClick = (clientX, clientY) => {
        if (dishMesh) return;
        if (!scene || !groundPlane || !camera) return;
        const rect = canvas.getBoundingClientRect();
        ndc.x =  ((clientX - rect.left) / rect.width)  * 2 - 1;
        ndc.y = -((clientY - rect.top)  / rect.height) * 2 + 1;
        raycaster.setFromCamera(ndc, camera);
        const hits = raycaster.intersectObject(groundPlane, false);
        if (hits.length === 0) return;
        const hit = hits[0].point;
        const targetScale = activeBaseScale;
        const params = {
          x: hit.x,
          y: hit.y + FLOAT_OFFSET_M,
          z: hit.z,
          rot: Math.random() * Math.PI * 2,
          scale: targetScale,
        };
        hintEl.classList.add('is-hidden');
        if (modelReady) placeDish(params);
        else { showPlaceholder(clientX, clientY); pendingPlace = params; }
      };

      // Track touch start so we can distinguish tap from drag (gesture
      // detection). For mouse we use plain click.
      let tapStartX = 0, tapStartY = 0, tapStartTime = 0;
      canvas.addEventListener('touchstart', (e) => {
        if (e.touches.length !== 1) return;
        tapStartX = e.touches[0].clientX;
        tapStartY = e.touches[0].clientY;
        tapStartTime = performance.now();
      }, { passive: true });
      canvas.addEventListener('touchend', (e) => {
        if (e.changedTouches.length !== 1) return;
        const t = e.changedTouches[0];
        if (Math.abs(t.clientX - tapStartX) > 10) return;
        if (Math.abs(t.clientY - tapStartY) > 10) return;
        if (performance.now() - tapStartTime > 600) return;
        onClick(t.clientX, t.clientY);
      }, { passive: true });

      canvas.addEventListener('click', (e) => onClick(e.clientX, e.clientY));
    }

    // ── Two-finger pinch + rotate ─────────────────────────────────────────
    function setupGestures() {
      let active = false;
      let startDist = 0, startAngle = 0;
      let startScale = 0, startRotY = 0;
      const distance = (a, b) => Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);
      const angle    = (a, b) => Math.atan2(b.clientY - a.clientY, b.clientX - a.clientX);

      canvas.addEventListener('touchstart', (e) => {
        if (e.touches.length !== 2 || !dishMesh) return;
        active = true;
        startDist  = distance(e.touches[0], e.touches[1]);
        startAngle = angle(e.touches[0], e.touches[1]);
        startScale = dishMesh.scale.x;
        startRotY  = dishMesh.rotation.y;
      }, { passive: true });

      canvas.addEventListener('touchmove', (e) => {
        if (!active || e.touches.length !== 2 || !dishMesh) return;
        const d = distance(e.touches[0], e.touches[1]);
        const a = angle(e.touches[0], e.touches[1]);
        const factor = d / startDist;
        const min = startScale * PINCH_MIN;
        const max = startScale * PINCH_MAX;
        const s = THREE.MathUtils.clamp(startScale * factor, min, max);
        dishMesh.scale.set(s, s, s);
        dishMesh.rotation.y = startRotY + (a - startAngle);
      }, { passive: true });

      canvas.addEventListener('touchend', (e) => {
        if (e.touches.length < 2) active = false;
      }, { passive: true });

      // Mouse-wheel zoom for desktop preview.
      canvas.addEventListener('wheel', (e) => {
        if (!dishMesh) return;
        e.preventDefault();
        const factor = e.deltaY < 0 ? 1.05 : 0.95;
        const newScale = THREE.MathUtils.clamp(
          dishMesh.scale.x * factor,
          activeBaseScale * PINCH_MIN,
          activeBaseScale * PINCH_MAX
        );
        dishMesh.scale.set(newScale, newScale, newScale);
      }, { passive: false });
    }

    // ──────────────────────────────────────────────────────────────────────
    // Bootstrap — choose AR or desktop based on device capability
    //
    // We can't rely on `(pointer: coarse)` alone:
    //   • iPad in "Request Desktop Website" mode reports `pointer: fine`
    //     even though it has a real rear camera and SLAM works.
    //   • 2-in-1 Windows laptops with touchscreens report `pointer: coarse`
    //     even though they have no rear camera and SLAM does NOT work.
    //
    // The reliable signal is whether the device is iOS / Android (mobile
    // user agent) AND has navigator.mediaDevices for camera access. We
    // combine UA detection with a touch capability check.
    // ──────────────────────────────────────────────────────────────────────
    const ua = navigator.userAgent;
    const isIOS =
      /iPad|iPhone|iPod/.test(ua) ||
      // iPad on iOS 13+ identifies as "Macintosh" with touch — the only
      // way to detect it is the platform + touchpoints combo.
      (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    const isAndroid = /Android/.test(ua);
    const isMobile  = isIOS || isAndroid;
    const hasCamera = !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);

    console.log('[aroma-ar] boot', {
      isIOS, isAndroid, isMobile, hasCamera,
      modelUrl, hasXR8: !!window.XR8,
    });

    if (isMobile && hasCamera) {
      bootMobileAR();
    } else {
      bootDesktopPreview();
    }

    /**
     * Mobile AR path — wires our scene additions into the 8th Wall pipeline.
     * 8th Wall owns the renderer, scene, and camera; we just attach content.
     */
    function bootMobileAR() {
      const initScenePipelineModule = () => ({
        name: 'aromathreejsinit',
        onStart: ({ canvas: xrCanvas }) => {
          const xrScene = XR8.Threejs.xrScene();
          scene    = xrScene.scene;
          camera   = xrScene.camera;
          renderer = xrScene.renderer;

          configureRenderer(renderer);
          applyEnvironment(scene, buildEnvironment(renderer));

          addLighting(scene);
          addRaycastAndShadowPlane(scene);
          // No playground on mobile — the real camera feed IS the backdrop.

          camera.position.set(0, 3, 0);

          XR8.XrController.updateCameraProjectionMatrix({
            origin: camera.position,
            facing: camera.quaternion,
          });

          // Prevent native scrolling on canvas so gestures aren't hijacked.
          xrCanvas.addEventListener('touchmove', (e) => e.preventDefault(),
            { passive: false });

          loadModel();
        },
      });

      const onxrloaded = () => {
        XR8.addCameraPipelineModules([
          XR8.GlTextureRenderer.pipelineModule(),
          XR8.Threejs.pipelineModule(),
          XR8.XrController.pipelineModule(),
          LandingPage.pipelineModule(),
          XRExtras.FullWindowCanvas.pipelineModule(),
          XRExtras.Loading.pipelineModule(),
          XRExtras.RuntimeError.pipelineModule(),
          initScenePipelineModule(),
        ]);
        setupPlacementInput();
        setupGestures();
        XR8.run({ canvas, allowedDevices: 'any' });
      };

      if (window.XR8) onxrloaded();
      else window.addEventListener('xrloaded', onxrloaded);
    }

    /**
     * Desktop preview path — own renderer, own render loop, full playground.
     * Mimics what A-Frame's xrweb defaultEnvironment* gave us automatically.
     */
    function bootDesktopPreview() {
      console.log('[aroma-ar] desktop preview booting');
      // Desktop renders the GLB at raw units so plates need a much smaller
      // scale than the responsive-scaled mobile path.
      activeBaseScale = BASE_SCALE_DESKTOP;
      renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight, false);
      configureRenderer(renderer);
      renderer.setClearColor(0xb4c4cc, 1);  // horizon colour fallback

      scene  = new THREE.Scene();
      applyEnvironment(scene, buildEnvironment(renderer));
      camera = new THREE.PerspectiveCamera(
        60, window.innerWidth / window.innerHeight, 0.1, 1000
      );
      // Eye-level view of the playground. y=2 puts us at "human standing"
      // height. Looking slightly down (lookAt y=0.5) frames the foreground
      // sand in the bottom half and the sky+horizon in the top half.
      camera.position.set(0, 2.5, 8);
      camera.lookAt(0, 0.5, 0);

      addPlayground(scene);
      addLighting(scene);
      addRaycastAndShadowPlane(scene);

      console.log('[aroma-ar] desktop scene ready', {
        sceneChildren: scene.children.length,
        canvasSize: [renderer.domElement.width, renderer.domElement.height],
      });

      setupPlacementInput();
      setupGestures();

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight, false);
      });

      const tick = () => {
        renderer.render(scene, camera);
        requestAnimationFrame(tick);
      };
      requestAnimationFrame(tick);

      loadModel();
    }
  </script>
</body>
</html>
