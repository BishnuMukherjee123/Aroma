<style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f8f9ff;
      }
      .headline-font {
        font-family: 'Manrope', sans-serif;
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }

        background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23b61722' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");

<body class="bg-surface text-on-surface min-h-screen flex flex-col justify-center items-center p-6 relative overflow-hidden">
<!-- Decorative Elements (The Digital Maître D’ Style) -->
<div class="absolute top-0 left-0 w-full h-full bg-texture pointer-events-none"></div>
<div class="absolute top-[-10%] right-[-10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[30%] h-[30%] bg-surface-container-high/40 rounded-full blur-[80px] pointer-events-none"></div>
<main class="w-full max-w-[440px] relative z-10">
<!-- Branding Header -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-16 h-16 bg-primary rounded-xl mb-4 shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-white text-3xl" style="font-variation-settings: 'FILL' 1;">restaurant_menu</span>
</div>
<h1 class="headline-font text-3xl font-extrabold tracking-tight text-on-surface">Aroma AR</h1>
<p class="text-on-surface-variant mt-2 text-sm font-medium">Management Portal</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-xl p-8 md:p-10 shadow-[0_12px_40px_rgba(18,28,42,0.06)] border border-outline-variant/10">
<header class="mb-8">
<h2 class="headline-font text-xl font-bold text-on-surface">Sign In</h2>
<p class="text-on-surface-variant text-sm mt-1">Enter your credentials to manage your restaurant.</p>
</header>
<form action="#" class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="text-xs font-semibold uppercase tracking-wider text-on-surface-variant flex items-center gap-2" for="email">
<span class="material-symbols-outlined text-sm">mail</span>
                        Email Address
                    </label>
<input class="w-full bg-surface-container-low border-none rounded-lg px-4 py-3 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all" id="email" name="email" placeholder="manager@aroma.com" type="email"/>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="text-xs font-semibold uppercase tracking-wider text-on-surface-variant flex items-center gap-2" for="password">
<span class="material-symbols-outlined text-sm">lock</span>
                            Password
                        </label>
<a class="text-xs font-bold text-primary hover:text-primary-container transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-lg px-4 py-3 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary/20" id="remember" type="checkbox"/>
<label class="ml-2 text-sm text-on-surface-variant font-medium" for="remember">Keep me signed in for 30 days</label>
</div>
<!-- Primary Action -->
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold py-4 rounded-lg shadow-md shadow-primary/20 hover:shadow-lg hover:brightness-110 active:scale-[0.98] transition-all headline-font tracking-wide" type="submit">
                    Sign In
                </button>
</form>
<!-- Secondary Actions -->
<div class="mt-8 pt-8 border-t border-outline-variant/10 text-center">
<p class="text-on-surface-variant text-sm font-medium">
                    New restaurant? 
                    <a class="text-primary font-bold hover:underline ml-1" href="#">Contact Sales</a>
</p>
</div>
</div>
<!-- Footer Info -->
<footer class="mt-12 flex flex-col items-center gap-4">
<div class="flex items-center gap-6 text-sm font-medium text-outline">
<a class="hover:text-primary transition-colors" href="#">Security</a>
<span class="w-1 h-1 bg-outline-variant rounded-full"></span>
<a class="hover:text-primary transition-colors" href="#">Support</a>
<span class="w-1 h-1 bg-outline-variant rounded-full"></span>
<a class="hover:text-primary transition-colors" href="#">Privacy</a>
</div>
<p class="text-[11px] uppercase tracking-widest text-outline/60 font-bold">
                © 2024 Aroma Augmented Reality Systems
            </p>
</footer>
</main>
<!-- Side Graphic for Web (Only shows on large screens to break symmetry) -->
<div class="hidden xl:block fixed right-12 top-1/2 -translate-y-1/2 w-[400px]">
<div class="bg-surface-container-high rounded-3xl overflow-hidden shadow-2xl rotate-3 scale-105 border-8 border-surface-container-lowest">
<img alt="Professional restaurant management dashboard interface showing analytics and active menu items" class="w-full h-auto grayscale-[20%] opacity-90" data-alt="high-end professional restaurant management dashboard UI with clean charts, red accents, and luxury food photography on a sleek interface" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC-JceeKOexO7IZrqKe2uXmoFHTHYCCBQg_pGaJhncFGyFvzlgjCdv0Z7mHU1618vsDX2mIPtQ-awTAEMAi1Hv2ohAK6BSz0oEJYRSNmKF5Z67ZusizWdBRSYd3PHqgD76qcco_YGvV0gyEOKhS6_JxlNqe8W3ePp6ejY5Fugzqe0l1cpRivMXBUWTF-1keCSIY8DsOqb62AvXLF4AVSeLgSpplyGPwfWRtAkF3ZH_u43ZM8uzqSkJMEv6iKKFwGpWXJhkNzbwT0XQ"/>
<div class="absolute inset-0 bg-gradient-to-t from-background/40 to-transparent"></div>
</div>
</div>
</body></html>
